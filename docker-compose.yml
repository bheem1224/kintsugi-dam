services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kintsugi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /path/to/user/media:/media:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kintsugi_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
